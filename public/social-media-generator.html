<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimaMinds – Social Media Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
  h1 { text-align: center; margin-bottom: 30px; font-size: 24px; color: #a8d8a8; }
  .controls { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
  button {
    padding: 12px 28px; border: none; border-radius: 8px; cursor: pointer;
    font-size: 15px; font-weight: 700; transition: all .2s;
  }
  .btn-static { background: #2d6a4f; color: white; }
  .btn-static:hover { background: #1b4332; }
  .btn-reel { background: #7b2d8b; color: white; }
  .btn-reel:hover { background: #5a1f66; }
  .btn-dl { background: #c9732a; color: white; }
  .btn-dl:hover { background: #a05520; }
  .note { text-align:center; color:#aaa; font-size:13px; margin-bottom:20px; }
  .canvas-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  canvas { border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); max-width: 100%; }
  .section-title { color: #a8d8a8; font-size: 18px; font-weight: 700; margin-top: 10px; }
  #reel-canvas { display: none; }
</style>
</head>
<body>

<h1>🎨 AnimaMinds — Social Media Generator</h1>
<p class="note">Generează materiale vizuale pentru lansarea Experience Edition pe Facebook</p>

<div class="controls">
  <button class="btn-static" onclick="drawStatic()">🖼️ Generează Colaj Static (1080×1350)</button>
  <button class="btn-dl" onclick="downloadStatic()">⬇️ Descarcă PNG</button>
</div>
<div class="controls">
  <button class="btn-reel" onclick="startReel()">▶️ Previzualizează Reel</button>
  <button class="btn-dl" id="btn-mp4" onclick="exportMP4()">🎬 Descarcă MP4 (15 sec)</button>
</div>
<div id="progress-wrap" style="display:none;text-align:center;margin-bottom:16px;">
  <div id="progress-bar" style="height:8px;background:#6ee7b7;width:0%;border-radius:4px;transition:width .3s;max-width:600px;margin:0 auto 8px;"></div>
  <span id="progress-txt" style="color:#6ee7b7;font-size:14px;">Se înregistrează... 0%</span>
</div>

<div class="canvas-wrap">
  <div class="section-title">📸 Colaj Static Facebook (1080×1350)</div>
  <canvas id="static-canvas" width="1080" height="1350"></canvas>
  <div class="section-title">🎬 Reel Facebook (1080×1920)</div>
  <canvas id="reel-canvas" width="1080" height="1920"></canvas>
</div>

<script>
// ─── LOAD IMAGES ────────────────────────────────────────────────────────────
const imgPaths = {
  exterior: '/images/hotel/hotel-exterior.png',
  camera:   '/images/hotel/hotel-camera.png',
  lobby:    '/images/hotel/hotel-lobby.png',
  cascada:  '/images/hotel/zona-cascada.webp',
  lac:      '/images/hotel/zona-lac.jpg',
  natura:   '/images/hotel/zona-natura.jpg',
};
const loaded = {};
function loadImg(key, src) {
  return new Promise(res => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { loaded[key] = img; res(); };
    img.onerror = () => { loaded[key] = null; res(); };
    img.src = src;
  });
}
Promise.all(Object.entries(imgPaths).map(([k,v]) => loadImg(k,v)))
  .then(() => { drawStatic(); });

// ─── HELPERS ────────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawImgCover(ctx, img, x, y, w, h) {
  if (!img) return;
  const ir = img.width / img.height;
  const cr = w / h;
  let sx, sy, sw, sh;
  if (ir > cr) { sh = img.height; sw = sh * cr; sx = (img.width - sw) / 2; sy = 0; }
  else          { sw = img.width; sh = sw / cr; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function textFit(ctx, text, maxW, startSize) {
  let size = startSize;
  do { ctx.font = `900 ${size}px 'Georgia', serif`; size -= 2; }
  while (ctx.measureText(text).width > maxW && size > 20);
  ctx.font = `900 ${size + 2}px 'Georgia', serif`;
}

// ─── STATIC 1080×1350 ───────────────────────────────────────────────────────
function drawStatic() {
  const c = document.getElementById('static-canvas');
  const ctx = c.getContext('2d');
  const W = 1080, H = 1350;

  // BG dark charcoal
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.save(); ctx.globalAlpha = 0.03; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 80) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
  for (let gy = 0; gy < H; gy += 80) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
  ctx.globalAlpha = 1; ctx.restore();

  // Decorative arc top-right
  ctx.save(); ctx.globalAlpha = 0.07; ctx.strokeStyle = '#6ee7b7';
  ctx.lineWidth = 100; ctx.beginPath(); ctx.arc(W+80, -80, 580, 0, Math.PI*0.55); ctx.stroke();
  ctx.lineWidth = 50; ctx.beginPath(); ctx.arc(W+80, -80, 780, 0, Math.PI*0.45); ctx.stroke();
  ctx.globalAlpha = 1; ctx.restore();

  // Top accent bar
  ctx.fillStyle = '#059669'; ctx.fillRect(0, 0, W, 6);

  // PRIMA EDIȚIE pill
  ctx.save();
  roundRect(ctx, 60, 34, 270, 48, 24);
  ctx.fillStyle = 'rgba(5,150,105,0.18)'; ctx.fill();
  ctx.strokeStyle = '#059669'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#6ee7b7'; ctx.font = '700 19px "Segoe UI", sans-serif';
  ctx.fillText('✦  PRIMA EDIȚIE  ·  2026', 82, 64);
  ctx.restore();

  // AnimaMinds top-right
  ctx.save(); ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.font = '500 18px "Segoe UI", sans-serif';
  ctx.fillText('animaminds.ro', W - 60, 64); ctx.restore();

  // Categorie program
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = '#059669'; ctx.font = '700 20px "Segoe UI", sans-serif';
  ctx.fillText('PROGRAM DE FORMARE PROFESIONALĂ', W/2, 168); ctx.restore();

  // Linie sub categorie
  ctx.save(); ctx.strokeStyle = 'rgba(5,150,105,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2-300,182); ctx.lineTo(W/2+300,182); ctx.stroke(); ctx.restore();

  // Titlu mare
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff'; ctx.font = '900 100px Georgia, serif';
  ctx.fillText('Conversații', W/2, 310);
  ctx.fillStyle = '#6ee7b7'; ctx.font = '900 100px Georgia, serif';
  ctx.fillText('care Contează', W/2, 426); ctx.restore();

  // Experience Edition
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = '400 28px Georgia, serif';
  ctx.fillText('Experience Edition™', W/2, 492); ctx.restore();

  // Separator
  ctx.save();
  const sep = ctx.createLinearGradient(0,520,W,520);
  sep.addColorStop(0,'transparent'); sep.addColorStop(0.5,'rgba(110,231,183,0.3)'); sep.addColorStop(1,'transparent');
  ctx.strokeStyle = sep; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(80,520); ctx.lineTo(W-80,520); ctx.stroke(); ctx.restore();

  // Info 3 carduri text
  let y = 544;
  [
    { icon:'📅', top:'23–25 octombrie 2026', bot:'3 zile · format rezidențial' },
    { icon:'�', top:'Grup restrâns', bot:'20–30 participanți' },
    { icon:'🎓', top:'8 credite CPD', bot:'Certificat de participare' },
  ].forEach((d, i) => {
    const dw2 = (W-120)/3;
    const cx2 = 60 + i*dw2 + dw2/2;
    ctx.save();
    roundRect(ctx, 60+i*dw2+8, y, dw2-16, 118, 16);
    ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fill();
    ctx.strokeStyle = 'rgba(110,231,183,0.1)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.textAlign = 'center';
    ctx.font = '26px "Segoe UI"'; ctx.fillStyle = '#fff'; ctx.fillText(d.icon, cx2, y+40);
    ctx.font = '700 21px "Segoe UI", sans-serif'; ctx.fillStyle = '#ffffff'; ctx.fillText(d.top, cx2, y+74);
    ctx.font = '400 17px "Segoe UI", sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillText(d.bot, cx2, y+98);
    ctx.restore();
  });

  y += 142;

  // Beneficii strip
  ctx.save();
  roundRect(ctx, 60, y, W-120, 58, 29);
  ctx.fillStyle = 'rgba(110,231,183,0.07)'; ctx.fill();
  ctx.strokeStyle = 'rgba(110,231,183,0.18)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.textAlign = 'center'; ctx.fillStyle = '#6ee7b7'; ctx.font = '600 20px "Segoe UI", sans-serif';
  ctx.fillText('Cazare inclusă  ·  Mese incluse  ·  Materiale de formare  ·  Acces complet', W/2, y+34);
  ctx.restore();

  y += 78;

  // PRICE CARD
  const cardH = 360;
  ctx.save();
  roundRect(ctx, 60, y, W-120, cardH, 22);
  const cg = ctx.createLinearGradient(60, y, W-120, y+cardH);
  cg.addColorStop(0,'#14532d'); cg.addColorStop(1,'#052e16');
  ctx.fillStyle = cg; ctx.fill();
  ctx.strokeStyle = 'rgba(110,231,183,0.28)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Badge INSIDE top-center
  roundRect(ctx, W/2-260, y+18, 520, 50, 25);
  ctx.fillStyle = '#b45309'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = '800 20px "Segoe UI", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🔥  OFERTĂ DE LANSARE – PRIMA EDIȚIE', W/2, y+50);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(110, y+84); ctx.lineTo(W-110, y+84); ctx.stroke();

  // Label pachet
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '500 17px "Segoe UI", sans-serif';
  ctx.fillText('Pachet complet: formare + cazare + mese', W/2, y+110);

  // LEFT — cu cameră dublă
  const lx = 110;
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '500 19px "Segoe UI", sans-serif';
  ctx.fillText('Cu cameră dublă', lx, y+148);
  const stD = '1.450 lei';
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '400 19px "Segoe UI", sans-serif';
  ctx.fillText(stD, lx, y+174);
  const stDw = ctx.measureText(stD).width;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(lx,y+166); ctx.lineTo(lx+stDw,y+166); ctx.stroke();
  ctx.fillStyle = '#ffffff'; ctx.font = '900 88px Georgia, serif';
  ctx.fillText('1.200', lx, y+278);
  ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '500 21px "Segoe UI", sans-serif';
  ctx.fillText('lei / participant', lx, y+308);
  roundRect(ctx, lx, y+320, 250, 38, 19);
  ctx.fillStyle = '#fbbf24'; ctx.fill();
  ctx.fillStyle = '#78350f'; ctx.font = '700 17px "Segoe UI", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🎁 Economisești 250 lei', lx+125, y+344);

  // Vertical divider
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2+10,y+90); ctx.lineTo(W/2+10,y+cardH-16); ctx.stroke();

  // RIGHT — cu cameră single
  const rx2 = W/2+40;
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '500 19px "Segoe UI", sans-serif';
  ctx.fillText('Cu cameră single', rx2, y+148);
  const stS = '1.650 lei';
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '400 19px "Segoe UI", sans-serif';
  ctx.fillText(stS, rx2, y+174);
  const stSw = ctx.measureText(stS).width;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(rx2,y+166); ctx.lineTo(rx2+stSw,y+166); ctx.stroke();
  ctx.fillStyle = '#6ee7b7'; ctx.font = '900 88px Georgia, serif';
  ctx.fillText('1.400', rx2, y+278);
  ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '500 21px "Segoe UI", sans-serif';
  ctx.fillText('lei / participant', rx2, y+308);

  // -17% circle
  ctx.save(); ctx.beginPath(); ctx.arc(W-88,y+52,44,0,Math.PI*2);
  ctx.fillStyle = '#dc2626'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = '900 21px "Segoe UI", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('−17%', W-88, y+48); ctx.font = '600 12px "Segoe UI", sans-serif';
  ctx.fillText('reducere', W-88, y+65); ctx.restore();

  ctx.restore();
  y += cardH + 20;

  // 3 imagini mici circulare ca context vizual discret
  const imgList = [loaded.exterior, loaded.camera, loaded.lobby];
  const labels = ['Locație', 'Cazare', 'Spații comune'];
  const r = 60, gap = 40;
  const totalW = imgList.length * (r*2) + (imgList.length-1) * gap;
  const startX = (W - totalW) / 2;
  imgList.forEach((img, i) => {
    const cx3 = startX + i*(r*2+gap) + r;
    const cy3 = y + r + 10;
    ctx.save();
    ctx.beginPath(); ctx.arc(cx3, cy3, r, 0, Math.PI*2); ctx.clip();
    if (img) drawImgCover(ctx, img, cx3-r, cy3-r, r*2, r*2);
    else { ctx.fillStyle = '#1e3a2f'; ctx.fill(); }
    ctx.restore();
    // ring
    ctx.save(); ctx.beginPath(); ctx.arc(cx3, cy3, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(110,231,183,0.25)'; ctx.lineWidth = 2; ctx.stroke(); ctx.restore();
    // label
    ctx.save(); ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '400 15px "Segoe UI", sans-serif';
    ctx.fillText(labels[i], cx3, cy3 + r + 18); ctx.restore();
  });

  y += r*2 + 44;

  // Footer
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.font = '500 19px "Segoe UI", sans-serif';
  ctx.fillText('animaminds.ro  ·  program de formare profesională', W/2, y+16); ctx.restore();

  // Bottom bar
  ctx.fillStyle = '#059669'; ctx.fillRect(0, H-6, W, 6);
}

// ─── REEL ANIMATION 1080×1920 ───────────────────────────────────────────────
let reelAnim = null;
let reelFrame = 0;
const REEL_FPS = 30;
const REEL_DURATION = 15; // seconds
const REEL_TOTAL = REEL_FPS * REEL_DURATION;

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp01(t) { return Math.max(0, Math.min(1, t)); }

// segment: [startSec, endSec]
function segProgress(frame, startSec, endSec) {
  const s = startSec * REEL_FPS, e = endSec * REEL_FPS;
  return clamp01((frame - s) / (e - s));
}

function drawReelFrame(frame) {
  const c = document.getElementById('reel-canvas');
  const ctx = c.getContext('2d');
  const W = 1080, H = 1920;
  const t = frame / REEL_FPS; // time in seconds

  // BG
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#071510');
  bg.addColorStop(0.5, '#0d2b1e');
  bg.addColorStop(1, '#071510');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Background image with slow zoom (exterior throughout)
  if (loaded.exterior) {
    const zoom = 1 + t * 0.008; // slow Ken Burns
    ctx.save();
    ctx.globalAlpha = 0.22;
    const iw = W * zoom, ih = H * zoom;
    drawImgCover(ctx, loaded.exterior, -(iw - W) / 2, -(ih - H) / 2, iw, ih);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Decorative vertical lines
  ctx.save();
  ctx.strokeStyle = 'rgba(110,231,183,0.08)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 120) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.restore();

  // ── SEG 1: 0–3s — Experience Edition / Prima editie
  {
    const p = easeInOut(clamp01(segProgress(frame, 0, 2.5)));
    const fadeOut = t > 2.5 ? easeInOut(clamp01(1 - (t - 2.5) / 0.5)) : 1;
    const alpha = p * fadeOut;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#6ee7b7';
    ctx.font = '700 36px "Segoe UI", sans-serif';
    ctx.fillText('✨ PRIMA EDIȚIE', W / 2, 700 - (1 - p) * 30);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 30;
    ctx.font = '900 148px Georgia, serif';
    ctx.fillText('Experience', W / 2, 870 - (1 - p) * 40);
    ctx.fillStyle = '#6ee7b7';
    ctx.font = '900 148px Georgia, serif';
    ctx.fillText('Edition', W / 2, 1020 - (1 - p) * 40);
    ctx.restore();
  }

  // ── SEG 2: 3–6s — Conversatii care Conteaza
  if (t >= 2.8 && t < 6.5) {
    const p = easeInOut(clamp01(segProgress(frame, 2.8, 5)));
    const fadeOut = t > 5.5 ? easeInOut(clamp01(1 - (t - 5.5) / 1)) : 1;
    const alpha = p * fadeOut;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    // Hotel image card
    if (loaded.camera) {
      ctx.save();
      roundRect(ctx, 140, 560, W - 280, 360, 20);
      ctx.clip();
      drawImgCover(ctx, loaded.camera, 140, 560, W - 280, 360);
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(140, 560, W - 280, 360);
      ctx.restore();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '400 32px Georgia, serif';
    ctx.fillText('Program rezidențial de formare profesională', W / 2, 620 - (1 - p) * 20);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 20;
    ctx.font = '900 82px Georgia, serif';
    ctx.fillText('Conversații care', W / 2, 840 - (1 - p) * 30);
    ctx.fillText('Contează', W / 2, 940 - (1 - p) * 30);
    ctx.restore();
  }

  // ── SEG 3: 6–9s — Hotel + Date
  if (t >= 5.8 && t < 9.5) {
    const p = easeInOut(clamp01(segProgress(frame, 5.8, 8)));
    const fadeOut = t > 8.5 ? easeInOut(clamp01(1 - (t - 8.5) / 1)) : 1;
    const alpha = p * fadeOut;
    ctx.save();
    ctx.globalAlpha = alpha;
    if (loaded.exterior) {
      ctx.save();
      roundRect(ctx, 80, 520, W - 160, 500, 24);
      ctx.clip();
      drawImgCover(ctx, loaded.exterior, 80, 520, W - 160, 500);
      const ov = ctx.createLinearGradient(0, 520, 0, 1020);
      ov.addColorStop(0, 'rgba(0,0,0,0.1)');
      ov.addColorStop(1, 'rgba(7,21,16,0.95)');
      ctx.fillStyle = ov;
      ctx.fillRect(80, 520, W - 160, 500);
      ctx.restore();
    }
    ctx.textAlign = 'center';
    ctx.fillStyle = '#6ee7b7';
    ctx.font = '700 38px "Segoe UI", sans-serif';
    ctx.fillText('📍  Hotel Afrodita****', W / 2, 930 - (1-p)*20);
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '400 32px "Segoe UI", sans-serif';
    ctx.fillText('Vălenii de Munte', W / 2, 980 - (1-p)*20);
    ctx.fillStyle = '#fff';
    ctx.font = '700 52px Georgia, serif';
    ctx.fillText('23–25 octombrie 2026', W / 2, 1060 - (1-p)*20);
    ctx.restore();
  }

  // ── SEG 4: 9–12s — Price card
  if (t >= 8.8 && t < 12.5) {
    const p = easeInOut(clamp01(segProgress(frame, 8.8, 11)));
    const fadeOut = t > 11.5 ? easeInOut(clamp01(1 - (t - 11.5) / 1)) : 1;
    const alpha = p * fadeOut;
    ctx.save();
    ctx.globalAlpha = alpha;

    // Card BG
    const cy = 500, ch = 600;
    roundRect(ctx, 80, cy, W - 160, ch, 28);
    const cg = ctx.createLinearGradient(80, cy, W - 160, cy + ch);
    cg.addColorStop(0, '#1b4332');
    cg.addColorStop(1, '#0d2b1e');
    ctx.fillStyle = cg;
    ctx.fill();
    ctx.strokeStyle = 'rgba(110,231,183,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Badge OFERTA
    roundRect(ctx, W/2 - 280, cy - 26, 560, 52, 26);
    ctx.fillStyle = '#d97706';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = '800 24px "Segoe UI", sans-serif';
    ctx.fillText('🔥  OFERTĂ DE LANSARE', W / 2, cy + 8);

    // -17% circle
    ctx.save();
    ctx.beginPath();
    ctx.arc(W - 140, cy + 90, 58, 0, Math.PI * 2);
    ctx.fillStyle = '#dc2626';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '900 28px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('−17%', W - 140, cy + 86);
    ctx.font = '600 16px "Segoe UI", sans-serif';
    ctx.fillText('reducere', W - 140, cy + 108);
    ctx.restore();

    // Standard price crossed
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '400 26px "Segoe UI", sans-serif';
    ctx.fillText('Tarif standard: 1.450 lei', 130, cy + 80);
    const tw = ctx.measureText('Tarif standard: 1.450 lei').width;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(130, cy + 70); ctx.lineTo(130 + tw, cy + 70); ctx.stroke();

    // Big launch price
    ctx.fillStyle = '#fff';
    ctx.font = '400 32px "Segoe UI", sans-serif';
    ctx.fillText('Tarif lansare', 130, cy + 140);
    ctx.font = '900 160px Georgia, serif';
    ctx.fillStyle = '#6ee7b7';
    ctx.fillText('1.200', 100, cy + 320);
    ctx.font = '600 42px "Segoe UI", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('lei / cameră dublă', 130, cy + 375);

    // Savings badge
    roundRect(ctx, 130, cy + 400, 320, 50, 25);
    ctx.fillStyle = '#fbbf24';
    ctx.fill();
    ctx.fillStyle = '#78350f';
    ctx.font = '700 22px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🎁 Economisești 250 lei', 290, cy + 432);

    // Single price
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '400 24px "Segoe UI", sans-serif';
    ctx.fillText('Cameră single: 1.400 lei', 130, cy + 490);

    ctx.restore();
  }

  // ── SEG 5: 12–15s — CTA
  if (t >= 11.8) {
    const p = easeInOut(clamp01(segProgress(frame, 11.8, 14)));
    ctx.save();
    ctx.globalAlpha = p;

    // Nature bg subtle
    if (loaded.lac) {
      ctx.save();
      ctx.globalAlpha = 0.15 * p;
      roundRect(ctx, 0, 400, W, H - 400, 0);
      ctx.clip();
      drawImgCover(ctx, loaded.lac, 0, 400, W, H - 400);
      ctx.restore();
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = '#dc2626';
    ctx.font = '900 52px "Segoe UI", sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 20;
    ctx.fillText('⚡ LOCURI LIMITATE', W / 2, 750 - (1-p)*30);

    ctx.fillStyle = '#fff';
    ctx.font = '700 48px Georgia, serif';
    ctx.fillText('20–30 participanți', W / 2, 830 - (1-p)*30);

    ctx.fillStyle = '#6ee7b7';
    ctx.font = '900 62px "Segoe UI", sans-serif';
    ctx.fillText('ÎNSCRIERI DESCHISE', W / 2, 960 - (1-p)*30);

    // Animated pulsing button
    const pulse = 1 + 0.03 * Math.sin(frame * 0.2);
    ctx.save();
    ctx.translate(W / 2, 1080);
    ctx.scale(pulse, pulse);
    roundRect(ctx, -260, -40, 520, 80, 40);
    ctx.fillStyle = '#059669';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '800 30px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Rezervă un loc acum', 0, 12);
    ctx.restore();

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '500 30px "Segoe UI", sans-serif';
    ctx.fillText('animaminds.ro', W / 2, 1190 - (1-p)*20);

    ctx.restore();
  }

  // ── Persistent branding (always visible)
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '500 24px "Segoe UI", sans-serif';
  ctx.fillText('AnimaMinds  •  program de formare profesională', W / 2, H - 40);
  // bottom green line
  const dl = ctx.createLinearGradient(0, H - 6, W, H - 6);
  dl.addColorStop(0, 'transparent');
  dl.addColorStop(0.5, '#6ee7b7');
  dl.addColorStop(1, 'transparent');
  ctx.strokeStyle = dl;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, H - 6); ctx.lineTo(W, H - 6); ctx.stroke();
  ctx.restore();
}

function startReel() {
  const c = document.getElementById('reel-canvas');
  c.style.display = 'block';
  if (reelAnim) cancelAnimationFrame(reelAnim);
  reelFrame = 0;
  function step() {
    drawReelFrame(reelFrame);
    reelFrame++;
    if (reelFrame < REEL_TOTAL) reelAnim = requestAnimationFrame(step);
    else { reelFrame = 0; reelAnim = requestAnimationFrame(step); } // loop
  }
  reelAnim = requestAnimationFrame(step);
}

// ─── DOWNLOAD ───────────────────────────────────────────────────────────────
function downloadStatic() {
  drawStatic();
  const a = document.createElement('a');
  a.download = 'animaminds-experience-edition-fb.png';
  a.href = document.getElementById('static-canvas').toDataURL('image/png');
  a.click();
}

function exportMP4() {
  const c = document.getElementById('reel-canvas');
  c.style.display = 'block';
  if (reelAnim) cancelAnimationFrame(reelAnim);

  // Check MediaRecorder support
  const mimeType = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(m => MediaRecorder.isTypeSupported(m));
  if (!mimeType) {
    alert('Browserul tău nu suportă înregistrare video directă.\nFolosește Chrome sau Edge.');
    return;
  }

  const btn = document.getElementById('btn-mp4');
  const prog = document.getElementById('progress-wrap');
  const bar = document.getElementById('progress-bar');
  const txt = document.getElementById('progress-txt');
  btn.disabled = true;
  btn.textContent = '⏳ Se înregistrează...';
  prog.style.display = 'block';

  const stream = c.captureStream(REEL_FPS);
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8000000 });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'animaminds-experience-edition-reel.webm';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    btn.disabled = false;
    btn.textContent = '🎬 Descarcă MP4 (15 sec)';
    prog.style.display = 'none';
    bar.style.width = '0%';
    startReel();
  };

  reelFrame = 0;
  recorder.start();

  function recordFrame() {
    drawReelFrame(reelFrame);
    const pct = Math.round((reelFrame / REEL_TOTAL) * 100);
    bar.style.width = pct + '%';
    txt.textContent = 'Se înregistrează... ' + pct + '%';
    reelFrame++;
    if (reelFrame < REEL_TOTAL) {
      reelAnim = requestAnimationFrame(recordFrame);
    } else {
      recorder.stop();
    }
  }
  reelAnim = requestAnimationFrame(recordFrame);
}
